# Model registry for inference benchmarking
# Each entry defines a model checkpoint and how to run it.
#
# Fields:
#   name:         Unique identifier used for results and caching
#   task:         classification | detection | segmentation
#   backend:      onnx | tensorrt | torch
#   source:       url | torchvision | ultralytics | huggingface | smp | local
#   url:          Direct download URL (for source: url)
#   local_path:   Relative path under models/ directory
#   input_shape:  [N, C, H, W]
#   input_mean:   Per-channel mean for normalization (0-1 scale)
#   input_std:    Per-channel std for normalization (0-1 scale)
#   warmup_runs:  Number of warmup inference passes before timing
#   benchmark_runs: Number of timed inference passes

models:
  - name: mobilenet_v2
    task: classification
    backend: onnx
    source: url
    url: "https://github.com/onnx/models/raw/main/validated/vision/classification/mobilenet/model/mobilenetv2-12.onnx"
    local_path: "models/mobilenet_v2.onnx"
    input_shape: [1, 3, 224, 224]
    input_mean: [0.485, 0.456, 0.406]
    input_std: [0.229, 0.224, 0.225]
    labels_url: "https://raw.githubusercontent.com/pytorch/hub/master/imagenet_classes.txt"
    warmup_runs: 10
    benchmark_runs: 100

  - name: resnet50_v1
    task: classification
    backend: onnx
    source: url
    url: "https://github.com/onnx/models/raw/main/validated/vision/classification/resnet/model/resnet50-v1-12.onnx"
    local_path: "models/resnet50_v1.onnx"
    input_shape: [1, 3, 224, 224]
    input_mean: [0.485, 0.456, 0.406]
    input_std: [0.229, 0.224, 0.225]
    warmup_runs: 10
    benchmark_runs: 100

  - name: efficientnet_lite4
    task: classification
    backend: onnx
    source: url
    url: "https://github.com/onnx/models/raw/main/validated/vision/classification/efficientnet-lite4/model/efficientnet-lite4-11.onnx"
    local_path: "models/efficientnet_lite4.onnx"
    input_shape: [1, 3, 224, 224]
    input_mean: [0.5, 0.5, 0.5]
    input_std: [0.5, 0.5, 0.5]
    warmup_runs: 10
    benchmark_runs: 100

  - name: squeezenet_1_1
    task: classification
    backend: onnx
    source: url
    url: "https://github.com/onnx/models/raw/main/validated/vision/classification/squeezenet/model/squeezenet1.1-7.onnx"
    local_path: "models/squeezenet_1_1.onnx"
    input_shape: [1, 3, 224, 224]
    input_mean: [0.485, 0.456, 0.406]
    input_std: [0.229, 0.224, 0.225]
    warmup_runs: 10
    benchmark_runs: 100

  # NOTE: yolov8n and yolo11n require the ultralytics package to export ONNX.
  # ultralytics hard-depends on opencv-python which clobbers the GStreamer build
  # in this image. To use these models, export the ONNX on a host machine with
  # ultralytics installed and copy the file to models/yolov8n.onnx, then set
  # source: local. Alternatively install with --no-deps in a separate image.
  #
  # - name: yolov8n
  #   task: detection
  #   backend: onnx
  #   source: local
  #   local_path: "models/yolov8n.onnx"
  #   input_shape: [1, 3, 640, 640]
  #   input_mean: [0.0, 0.0, 0.0]
  #   input_std: [1.0, 1.0, 1.0]
  #   conf_threshold: 0.25
  #   iou_threshold: 0.45
  #   num_classes: 80
  #   warmup_runs: 5
  #   benchmark_runs: 50
  #
  # - name: yolo11n
  #   task: detection
  #   backend: onnx
  #   source: ultralytics
  #   local_path: "models/yolo11n.onnx"
  #   input_shape: [1, 3, 640, 640]
  #   input_mean: [0.0, 0.0, 0.0]
  #   input_std: [1.0, 1.0, 1.0]
  #   conf_threshold: 0.25
  #   iou_threshold: 0.45
  #   num_classes: 80
  #   warmup_runs: 5
  #   benchmark_runs: 50

  # Requires: pip install rfdetr
  - name: rf_detr_base
    task: detection
    backend: onnx
    source: rfdetr
    rfdetr_size: base
    local_path: "models/rf_detr_base.onnx"
    input_shape: [1, 3, 560, 560]
    input_mean: [0.485, 0.456, 0.406]
    input_std: [0.229, 0.224, 0.225]
    warmup_runs: 5
    benchmark_runs: 50

  # ── Feature Matching ────────────────────────────────────────────────────────
  # Requires: pip install git+https://github.com/cvg/LightGlue.git
  # Both ONNX files (superpoint.onnx + superpoint_lightglue.onnx) are exported
  # automatically on first download. Same frame used as both image0/image1 to
  # benchmark the full pipeline latency at maximum match count.
  - name: superpoint_lightglue
    task: feature_matching
    backend: lightglue
    source: lightglue
    local_path: "models/superpoint.onnx"
    local_path_matcher: "models/superpoint_lightglue.onnx"
    input_shape: [1, 1, 480, 640]   # grayscale [N, 1, H, W]
    max_keypoints: 512
    warmup_runs: 5
    benchmark_runs: 50

  # ── Visual SLAM ─────────────────────────────────────────────────────────────
  # Requires: Isaac ROS Visual SLAM (libcuvslam.so system-installed)
  #   sudo apt install ros-humble-isaac-ros-visual-slam
  # or container: nvcr.io/nvidia/isaac/ros:aarch64-visual_slam
  #
  # camera_fx/fy/cx/cy: intrinsics for your specific camera. The defaults
  # below are generic 640×480 estimates — tune to your calibration file.
  - name: cuvslam_mono
    task: visual_slam
    backend: cuvslam
    source: system                  # library is system-installed, no download
    local_path: "models/.cuvslam_sentinel"
    input_shape: [1, 1, 480, 640]   # grayscale, used to set tracker resolution
    camera_fx: 515.0
    camera_fy: 515.0
    camera_cx: 320.0
    camera_cy: 240.0
    warmup_runs: 20                 # cuVSLAM needs frames to init its map
    benchmark_runs: 100

  # ── Segmentation ───────────────────────────────────────────────────────────
  # Requires: pip install transformers torch   (first run exports to ONNX)
  - name: segformer_b0_ade
    task: segmentation
    backend: onnx
    source: huggingface
    hf_model_id: "nvidia/segformer-b0-finetuned-ade-512-512"
    local_path: "models/segformer_b0_ade.onnx"
    input_shape: [1, 3, 512, 512]
    input_mean: [0.485, 0.456, 0.406]
    input_std: [0.229, 0.224, 0.225]
    num_classes: 150   # ADE20K
    warmup_runs: 5
    benchmark_runs: 50

  # Requires: pip install segmentation-models-pytorch torch   (first run exports to ONNX)
  - name: unet_resnet34
    task: segmentation
    backend: onnx
    source: smp
    smp_arch: Unet
    smp_encoder: resnet34
    smp_encoder_weights: imagenet
    smp_classes: 21    # PASCAL VOC palette; adjust to match your dataset
    local_path: "models/unet_resnet34.onnx"
    input_shape: [1, 3, 512, 512]
    input_mean: [0.485, 0.456, 0.406]
    input_std: [0.229, 0.224, 0.225]
    num_classes: 21
    warmup_runs: 5
    benchmark_runs: 50

  # TensorRT example — build engine with: trtexec --onnx=models/mobilenet_v2.onnx --saveEngine=models/mobilenet_v2.trt --fp16
